<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Placement Prep Tracker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>Placement Prep Tracker 🚀</h1>

            <p class="subtitle">
                Track your coding, aptitude, and interview preparation progress
            </p>

            <form id="loginForm">

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

                <div class="register-link">

                    <a href="register.html">
                        Create New Account
                    </a>

                </div>

                <p id="message"></p>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
