<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Tracker</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="dashboard-box">

        <h1>Coding Tracker 💻</h1>

        <p class="subtitle">
            Track your coding preparation progress
        </p>

        <div class="dashboard-cards">

            <div class="card coding-card">
                <h2>LeetCode</h2>
                <p>25 Problems Solved</p>
            </div>

            <div class="card aptitude-card">
                <h2>Java</h2>
                <p>18 Programs Completed</p>
            </div>

            <div class="card interview-card">
                <h2>HackerRank</h2>
                <p>10 Problems Solved</p>
            </div>

            <div class="card progress-card">
                <h2>Goal</h2>
                <p>100 Problems</p>
            </div>

        </div>

        <br>

        <a href="dashboard.html">
            <button class="logout-btn">
                Back To Dashboard
            </button>
        </a>

    </div>

</body>

</html>
