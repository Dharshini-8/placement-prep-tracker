<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="login-box">

            <h1>Create Account ✨</h1>

            <p class="subtitle">
                Register for Placement Prep Tracker
            </p>

            <form>

                <input
                    type="text"
                    placeholder="Enter Username"
                    required
                >

                <input
                    type="email"
                    placeholder="Enter Email"
                    required
                >

                <input
                    type="password"
                    placeholder="Create Password"
                    required
                >

                <button type="submit">
                    Register
                </button>

                <div class="register-link">

                    <a href="index.html">
                        Already have an account? Login
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
