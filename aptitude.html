<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptitude Tracker</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="dashboard-box">

        <h1>Aptitude Tracker 🧠</h1>

        <p class="subtitle">
            Track your aptitude preparation progress
        </p>

        <table border="1" width="100%" cellpadding="15">

            <tr>
                <th>Topic</th>
                <th>Solved</th>
                <th>Total</th>
            </tr>

            <tr>
                <td>Percentages</td>
                <td>15</td>
                <td>20</td>
            </tr>

            <tr>
                <td>Profit & Loss</td>
                <td>10</td>
                <td>15</td>
            </tr>

            <tr>
                <td>Time & Work</td>
                <td>8</td>
                <td>10</td>
            </tr>

            <tr>
                <td>Ratio & Proportion</td>
                <td>12</td>
                <td>15</td>
            </tr>

        </table>

        <br>

        <a href="dashboard.html">
            <button class="logout-btn">
                Back To Dashboard
            </button>
        </a>

    </div>

</body>

</html>
